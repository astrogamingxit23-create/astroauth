<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - ASTRO AUTH</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #0f172a; color: white; min-height: 100vh; }
        .sidebar { background-color: #1e293b; min-height: 100vh; padding: 20px; }
        .content { padding: 30px; }
        .card { background-color: #1e293b; border: none; color: white; }
        .table { color: white; }
        .table-dark { --bs-table-bg: #1e293b; }
        .btn-primary { background-color: #3b82f6; border: none; }
        .app-item { cursor: pointer; transition: 0.2s; }
        .app-item:hover { background-color: #334155; }
        .app-active { border-left: 4px solid #3b82f6; background-color: #334155; }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar -->
            <div class="col-md-2 sidebar shadow">
                <h4 class="mb-4 fw-bold">ASTRO <span class="text-primary">AUTH</span></h4>
                <div class="mb-4">
                    <p class="text-secondary small mb-1">USUÁRIO:</p>
                    <div id="adminUser" class="fw-bold"></div>
                    <span id="adminPlan" class="badge bg-primary mt-1">Free</span>
                </div>
                <hr class="border-secondary">
                <h5>Aplicativos</h5>
                <div id="appList" class="list-group list-group-flush mb-4">
                    <!-- Apps will be listed here -->
                </div>
                <button class="btn btn-sm btn-primary w-100" onclick="showNewAppModal()">+ Novo App</button>
                <hr class="border-secondary">
                <div class="mt-4">
                    <p class="text-secondary small mb-1">LINKS ÚTEIS:</p>
                    <a href="#" class="d-block text-secondary small mb-2 text-decoration-none">Documentação API</a>
                    <a href="#" class="d-block text-secondary small mb-2 text-decoration-none">Suporte</a>
                </div>
                <button class="btn btn-sm btn-outline-danger w-100 mt-5" onclick="logout()">Sair</button>
            </div>

            <!-- Main Content -->
            <div class="col-md-10 content">
                <div id="welcomeScreen">
                    <h1>Bem-vindo!</h1>
                    <p>Selecione um aplicativo na lateral para gerenciar as licenças.</p>
                </div>

                <div id="appDetails" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h2 id="currentAppName">App Name</h2>
                        <div>
                            <button class="btn btn-success" onclick="showGenerateKeysModal()">Gerar Chaves</button>
                            <button class="btn btn-danger" onclick="deleteCurrentApp()">Excluir App</button>
                        </div>
                    </div>

                    <div class="card p-3 mb-4">
                        <p class="mb-1"><strong>App ID:</strong> <span id="currentAppId" class="text-info"></span></p>
                        <p class="mb-0"><strong>App Secret:</strong> <span id="currentAppSecret" class="text-warning"></span></p>
                    </div>

                    <div class="card p-3">
                        <h5>Chaves de Licença</h5>
                        <div class="table-responsive">
                            <table class="table table-dark table-hover mt-3">
                                <thead>
                                    <tr>
                                        <th>Chave</th>
                                        <th>Duração</th>
                                        <th>Status</th>
                                        <th>Expira em</th>
                                        <th>Nota</th>
                                    </tr>
                                </thead>
                                <tbody id="licenseTableBody">
                                    <!-- Licenses will be listed here -->
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- New App Modal -->
    <div class="modal fade" id="newAppModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Novo Aplicativo</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="text" id="newAppName" class="form-control bg-secondary text-white border-0" placeholder="Nome do App">
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-primary" onclick="createApp()">Criar</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Generate Keys Modal -->
    <div class="modal fade" id="generateKeysModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">
                <div class="modal-header border-secondary">
                    <h5 class="modal-title">Gerar Chaves</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Quantidade</label>
                        <input type="number" id="keyAmount" class="form-control bg-secondary text-white border-0" value="1">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Duração (Dias)</label>
                        <input type="number" id="keyDuration" class="form-control bg-secondary text-white border-0" value="30">
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Nota (Opcional)</label>
                        <input type="text" id="keyNote" class="form-control bg-secondary text-white border-0">
                    </div>
                </div>
                <div class="modal-footer border-secondary">
                    <button type="button" class="btn btn-success" onclick="generateKeys()">Gerar</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        const plan = localStorage.getItem('plan') || 'Free';
        
        if (!token) window.location.href = 'login.html';
        
        document.getElementById('adminUser').innerText = username;
        document.getElementById('adminPlan').innerText = plan;
        if (plan === 'Premium') document.getElementById('adminPlan').className = 'badge bg-warning text-dark';
        if (plan === 'Enterprise') document.getElementById('adminPlan').className = 'badge bg-info text-dark';

        let currentAppId = null;

        async function fetchApps() {
            const res = await fetch('/api/application', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.status === 401) logout();
            const apps = await res.json();
            const list = document.getElementById('appList');
            list.innerHTML = '';
            apps.forEach(app => {
                const item = document.createElement('div');
                item.className = 'list-group-item list-group-item-action bg-transparent text-white app-item';
                if (currentAppId === app.id) item.classList.add('app-active');
                item.innerText = app.name;
                item.onclick = () => selectApp(app);
                list.appendChild(item);
            });
        }

        function selectApp(app) {
            currentAppId = app.id;
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('appDetails').style.display = 'block';
            document.getElementById('currentAppName').innerText = app.name;
            document.getElementById('currentAppId').innerText = app.id;
            document.getElementById('currentAppSecret').innerText = app.appSecret;
            fetchLicenses(app.id);
            fetchApps(); // Update sidebar active state
        }

        async function fetchLicenses(appId) {
            const res = await fetch(`/api/license/${appId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const licenses = await res.json();
            const tbody = document.getElementById('licenseTableBody');
            tbody.innerHTML = '';
            licenses.forEach(l => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td><code>${l.key}</code></td>
                    <td>${l.durationDays} dias</td>
                    <td><span class="badge ${l.isUsed ? 'bg-danger' : 'bg-success'}">${l.isUsed ? 'Usada' : 'Disponível'}</span></td>
                    <td>${l.expiresAt ? new Date(l.expiresAt).toLocaleDateString() : '-'}</td>
                    <td>${l.note || ''}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        function showNewAppModal() {
            new bootstrap.Modal(document.getElementById('newAppModal')).show();
        }

        async function createApp() {
            const name = document.getElementById('newAppName').value;
            const res = await fetch('/api/application', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(name)
            });
            if (res.ok) {
                location.reload();
            }
        }

        function showGenerateKeysModal() {
            new bootstrap.Modal(document.getElementById('generateKeysModal')).show();
        }

        async function generateKeys() {
            const amount = parseInt(document.getElementById('keyAmount').value);
            const duration = parseInt(document.getElementById('keyDuration').value);
            const note = document.getElementById('keyNote').value;

            const res = await fetch('/api/license/generate', {
                method: 'POST',
                headers: { 
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ applicationId: currentAppId, amount, durationDays: duration, note })
            });
            if (res.ok) {
                fetchLicenses(currentAppId);
                bootstrap.Modal.getInstance(document.getElementById('generateKeysModal')).hide();
            }
        }

        async function deleteCurrentApp() {
            if (!confirm('Tem certeza que deseja excluir este aplicativo e todas as suas chaves?')) return;
            const res = await fetch(`/api/application/${currentAppId}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) location.reload();
        }

        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        fetchApps();
    </script>
</body>
</html>
